name: "Pi 5 Fan Enabler"
version: "0.83"
slug: "pi5enableraddon"
description: "Esto activa el ventilador de la Raspberry Pi 5 al ejecutar Home Assistant OS. Puedes desinstalarlo una vez que se haya ejecutado. Consulta los registros para obtener más información."
arch:
  - aarch64
startup: "once"
auth_api: true
init: false
ingress: true
app_armor: false
privileged:
  - SYS_ADMIN
stage: "stable"
full_access: true
url: "https://github.com/cde21/CoolerPi5.git"
boot: "manual"
